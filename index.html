<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Arif Purnomo - Fullstack Web Developer</title>

    <!-- DARK MODE -->
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              brand: {
                light: "#dadbce", // Background utama (Sage Green)
                dark: "#1e293b", // Background dark mode
                primary: "#325b3e", // Warna teks/aksen hijau tua
                primaryDark: "#4ade80", // Aksen hijau terang untuk dark mode
              },
            },
          },
        },
      };
    </script>

    <!-- STYLE CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- Favicon -->
    <link rel="shortcut icon" href="images/favicon.png" type="image/png" />
  </head>

  <body>
    <!-- NAVIGATION -->
    <nav class="text-sm md:text-base font-medium whitespace-nowrap">
      <h1>
        <img src="/images/favicon.png" alt="logo" />
        <span>Arif Purnomo</span>
      </h1>
      <ul class="flex flex-row md:flex-col gap-2">
        <li>
          <a href="/" class="hover:text-brand-primaryDark transition">Home</a>
        </li>
        <li>
          <a href="/news" class="hover:text-brand-primaryDark transition"
            >News</a
          >
        </li>
        <li>
          <a href="/contact" class="hover:text-brand-primaryDark transition"
            >Contact</a
          >
        </li>
      </ul>
    </nav>

    <!-- MAIN CONTENT -->
    <main>
      <header>
        <img src="/images/photo-profile.jpg" alt="photo-profile" />
        <h2>Arif Purnomo</h2>
        <h3>Fullstack Web Developer</h3>
      </header>

      <p>
        I am a passionate <b>fullstack web developer</b> with expertise in
        TypeScript and React.
      </p>
    </main>

    <!-- FOOTER -->
    <footer>Copyright &copy; 2026 Arif Purnomo | All rights reserved</footer>

    <!-- SCRIPT JS -->
    <script>
      src = "script.js";
    </script>
  </body>
</html>
