<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Arif Purnomo - Fullstack Web Developer</title>

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              brand: {
                light: "#f3f4f6",
                dark: "black",
                primary: "#3b82f6",
              },
            },
          },
        },
      };
    </script>

    <link rel="stylesheet" href="style.css" />

    <link rel="shortcut icon" href="images/favicon.png" type="image/png" />
  </head>

  <body
    class="bg-brand-light text-black dark:bg-brand-dark dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col font-sans"
  >
    <nav
      class="w-full max-w-4xl mx-auto p-6 flex flex-col md:flex-row justify-between items-center gap-4"
    >
      <div class="flex items-center gap-3">
        <img
          src="/images/favicon.png"
          alt="logo"
          class="w-8 h-8 rounded-full"
          onerror="this.style.display = 'none'"
        />
        <h1 class="text-xl font-bold tracking-wide">Arif Purnomo</h1>
      </div>

      <div class="flex items-center gap-6">
        <ul class="flex gap-4 text-sm md:text-base font-medium">
          <li>
            <a href="/" class="hover:text-brand-primary transition">Home</a>
          </li>
          <li>
            <a href="/news" class="hover:text-brand-primary transition">News</a>
          </li>
          <li>
            <a href="/contact" class="hover:text-brand-primary transition"
              >Contact</a
            >
          </li>
        </ul>

        <button
          id="theme-toggle"
          class="p-2 rounded-lg bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 transition"
          aria-label="Toggle Dark Mode"
        >
          <svg
            id="theme-toggle-dark-icon"
            class="hidden w-5 h-5 text-yellow-400"
            fill="currentColor"
            viewBox="0 0 20 20"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
              fill-rule="evenodd"
              clip-rule="evenodd"
            ></path>
          </svg>
          <svg
            id="theme-toggle-light-icon"
            class="hidden w-5 h-5 text-gray-700"
            fill="currentColor"
            viewBox="0 0 20 20"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"
            ></path>
          </svg>
        </button>
      </div>
    </nav>

    <main
      class="flex-grow w-full max-w-3xl mx-auto p-6 flex flex-col items-center text-center mt-12"
    >
      <header class="flex flex-col items-center mb-8">
        <img
          src="/images/photo-profile.jpg"
          alt="photo-profile"
          class="w-32 h-32 rounded-full object-cover shadow-lg border-4 border-white dark:border-gray-800 mb-4"
          onerror="
            this.src = 'https://via.placeholder.com/150';
            this.onerror = null;
          "
        />
        <h2
          class="text-3xl font-bold tracking-tight text-gray-900 dark:text-white"
        >
          Arif Purnomo
        </h2>
        <h3 class="text-lg text-gray-600 dark:text-gray-400 mt-1">
          Fullstack Web Developer
        </h3>
      </header>

      <p class="text-lg leading-relaxed text-gray-700 dark:text-gray-300">
        I am a passionate <b>fullstack web developer</b> with expertise in
        TypeScript and React.
      </p>
    </main>

    <footer
      class="w-full p-6 text-center text-sm text-gray-500 dark:text-gray-400 mt-auto"
    >
      Copyright &copy; 2026 Arif Purnomo | All rights reserved
    </footer>

    <script src="script.js"></script>
  </body>
</html>
